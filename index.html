<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLock | Maximale Konzentration</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F3;
            --surface: #FFFFFF;
            --text: #111110;
            --accent: #B3F03A;
            --border: #E6E6E1;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .logo {
            background: var(--text);
            color: white;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            margin: 0 auto 24px;
        }
        h1 { font-size: 32px; margin: 0 0 12px 0; }
        p { color: #555; line-height: 1.6; margin: 0 0 32px 0; font-size: 16px; }
        .btn-primary {
            background: var(--accent);
            color: var(--text);
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
            transition: transform 0.2s;
            margin-bottom: 24px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .footer-link {
            display: inline-block;
            color: #777;
            text-decoration: none;
            font-size: 14px;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }
        .footer-link:hover {
            background: var(--bg);
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">FL</div>
        <h1>FocusLock</h1>
        <p>Der minimalistische Website-Blocker für tiefes Arbeiten. Blockiere Ablenkungen, setze Zeitlimits und nutze psychologische Friction-Sperren für maximalen Fokus.</p>
        
        <a href="https://chrome.google.com/webstore" class="btn-primary" target="_blank">Im Chrome Web Store ansehen</a>
        
        <br>
        <a href="datenschutz.html" class="footer-link">Datenschutzerklärung lesen</a>
    </div>

</body>
</html>
